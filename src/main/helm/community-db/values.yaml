# MariaDB (Bitnami chart 21.0.2 / app 11.8.2) for the community namespace.
# Standalone single-node deployment (one node handles read + write, no replication).
#
# Install/upgrade:
#   helm upgrade --install community-db-v2 bitnami/mariadb --version 21.0.2 \
#     -n community -f src/main/helm/community-db/values.yaml
architecture: standalone
auth:
  database: communityDb
  username: communityUser
  password: 47c84e6688b39a113e0f6727
  rootPassword: 0556aee9f4dff01e9905c7ad
fullnameOverride: community-db-v2
global:
  defaultStorageClass: nfs-client
primary:
  persistence:
    size: 8Gi
  resources:
    limits:
      cpu: 1500m
      memory: 1.5Gi
    requests:
      cpu: 500m
      memory: 1Gi
  resourcesPreset: none
